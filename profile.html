<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/profile.css" />
  </head>
  <body>
    <div>
      <h1 class="page-title">Personal Informations</h1>
      <p class="page-subtitle">Update your personal informations</p>
    </div>
    <div>
      <h1 class="page-title">Account Type</h1>
      <div class="tabs">
        <!-- Tab 1 -->
        <input type="radio" id="tab1" name="tab" checked />
        <label for="tab1">Personal</label>

        <!-- Tab 2 -->
        <input type="radio" id="tab2" name="tab" />
        <label for="tab2">Company</label>

        <!-- Content -->
        <div id="content1" class="tab-content">
          <div class="">
            <!-- Avatar Section -->
            <div class="avatar-section">
              <div class="avatar">
                <img
                  src="/assets/images/profleImage.jpg"
                  alt="Profile Avatar"
                />
                <div class="avatar-badge">✓</div>
              </div>
            </div>

            <!-- Form -->
            <form>
              <!-- Basic Information -->
              <div class="form-section">
                <h3 class="form-title">Basic Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input
                      type="text"
                      id="firstName"
                      placeholder="David"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input
                      type="text"
                      id="lastName"
                      placeholder="John"
                      required
                    />
                  </div>
                </div>
              </div>

              <!-- Contact Information -->
              <div class="form-section">
                <h3>Contact Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="email1">Email</label>
                    <input
                      type="email"
                      id="email1"
                      placeholder="david@gmail.com"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="phone1">Phone</label>
                    <input
                      type="tel"
                      id="phone1"
                      placeholder="+12345678987"
                      required
                    />
                  </div>
                </div>
              </div>

              <!-- Contact Information (Duplicate) -->
              <div class="form-section">
                <h3>Contact Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="email2">Email</label>
                    <input
                      type="email"
                      id="email2"
                      placeholder="david@gmail.com"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="phone2">Phone</label>
                    <input
                      type="tel"
                      id="phone2"
                      placeholder="+12345678987"
                      required
                    />
                  </div>
                </div>
              </div>

              <!-- Address Information -->
              <div class="form-section">
                <h3>Address Information</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label for="street">Street</label>
                    <input
                      type="text"
                      id="street"
                      placeholder="asdfghj"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="houseNo">House No</label>
                    <input
                      type="text"
                      id="houseNo"
                      placeholder="1234"
                      required
                    />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="postalCode">Postal Code</label>
                    <input
                      type="text"
                      id="postalCode"
                      placeholder="123456"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label for="city">City</label>
                    <input
                      type="text"
                      id="city"
                      placeholder="worry,utiuy"
                      required
                    />
                  </div>
                </div>

                <div class="form-row full">
                  <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" required>
                      <option value="">Select a country</option>
                      <option value="australia" selected>Australia</option>
                      <option value="usa">United States</option>
                      <option value="canada">Canada</option>
                      <option value="uk">United Kingdom</option>
                      <option value="india">India</option>
                      <option value="germany">Germany</option>
                      <option value="france">France</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Save Button -->
              <div class="button-section">
                <button type="submit" class="btn" style="width: 100px">
                  Save
                </button>
              </div>
            </form>
          </div>
        </div>
